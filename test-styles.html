<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Styles Penetration</title>
    <link rel="stylesheet" href="/slds/styles/salesforce-lightning-design-system.min.css">
    <style>
        .test-container {
            padding: 20px;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .success { background-color: #d4edda; color: #155724; }
        .failure { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body class="slds-scope">
    <div class="test-container">
        <h1>Style Penetration Test</h1>

        <div class="slds-card slds-p-around_medium">
            <h2 class="slds-text-heading_medium">Test Results</h2>
            <div id="results"></div>
        </div>

        <div id="app"></div>
    </div>

    <script type="module">
        import '@lwc/synthetic-shadow';
        import { createElement } from 'lwc';

        // Create a simple test component
        class TestComponent extends HTMLElement {
            connectedCallback() {
                this.innerHTML = `
                    <div class="slds-card slds-p-around_medium">
                        <h3 class="slds-text-heading_small">Inside LWC Component</h3>
                        <p class="slds-text-body_regular">This text is inside a component</p>
                        <button class="slds-button slds-button_brand">Test Button</button>
                    </div>
                `;
            }
        }

        customElements.define('test-component', TestComponent);

        // Add test component
        const testEl = document.createElement('test-component');
        document.getElementById('app').appendChild(testEl);

        // Run tests
        setTimeout(() => {
            const results = document.getElementById('results');
            const tests = [];

            // Test 1: SLDS loaded
            const sldsLoaded = document.querySelector('link[href*="salesforce-lightning-design-system"]') !== null;
            tests.push({
                name: 'SLDS CSS Loaded',
                passed: sldsLoaded
            });

            // Test 2: Styles on regular elements
            const regularCard = document.querySelector('.test-container .slds-card');
            if (regularCard) {
                const styles = window.getComputedStyle(regularCard);
                const hasCardStyles = styles.backgroundColor !== 'rgba(0, 0, 0, 0)' ||
                                     styles.boxShadow !== 'none';
                tests.push({
                    name: 'SLDS styles on regular DOM',
                    passed: hasCardStyles,
                    details: `bg: ${styles.backgroundColor}, shadow: ${styles.boxShadow}`
                });
            }

            // Test 3: Styles inside component
            const componentCard = document.querySelector('test-component .slds-card');
            if (componentCard) {
                const styles = window.getComputedStyle(componentCard);
                const hasCardStyles = styles.backgroundColor !== 'rgba(0, 0, 0, 0)' ||
                                     styles.boxShadow !== 'none';
                tests.push({
                    name: 'SLDS styles inside component',
                    passed: hasCardStyles,
                    details: `bg: ${styles.backgroundColor}, shadow: ${styles.boxShadow}`
                });
            }

            // Test 4: Can query inside component
            const canQuery = document.querySelectorAll('test-component .slds-button').length > 0;
            tests.push({
                name: 'Can query inside component (synthetic shadow)',
                passed: canQuery
            });

            // Display results
            results.innerHTML = tests.map(test => `
                <div class="status ${test.passed ? 'success' : 'failure'}">
                    ${test.passed ? '✅' : '❌'} ${test.name}
                    ${test.details ? '<br><small>' + test.details + '</small>' : ''}
                </div>
            `).join('');

            // Summary
            const allPassed = tests.every(t => t.passed);
            results.innerHTML += `
                <div class="status ${allPassed ? 'success' : 'failure'}" style="margin-top: 20px; font-weight: bold;">
                    ${allPassed ? '✅ All tests passed!' : '⚠️ Some tests failed'}
                </div>
            `;
        }, 1000);
    </script>
</body>
</html>
