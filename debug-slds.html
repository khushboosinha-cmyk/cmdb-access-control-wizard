<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug SLDS Styles</title>
    <link rel="stylesheet" href="/slds/styles/salesforce-lightning-design-system.min.css">
</head>
<body class="slds-scope">
    <h1>SLDS Debug Test</h1>

    <div class="slds-card slds-p-around_medium slds-m-bottom_medium">
        <h2 class="slds-text-heading_small">This is a test card</h2>
        <p class="slds-text-body_regular">If SLDS is loading correctly, this should have card styling.</p>
        <span class="slds-badge">Test Badge</span>
    </div>

    <button class="slds-button slds-button_brand">Brand Button</button>

    <script>
        // Check if styles are applied
        window.addEventListener('load', () => {
            const card = document.querySelector('.slds-card');
            const badge = document.querySelector('.slds-badge');
            const button = document.querySelector('.slds-button');

            if (card) {
                const styles = window.getComputedStyle(card);
                console.log('Card styles:');
                console.log('  Background:', styles.backgroundColor);
                console.log('  Border:', styles.border);
                console.log('  Box shadow:', styles.boxShadow);
            }

            if (badge) {
                const styles = window.getComputedStyle(badge);
                console.log('Badge styles:');
                console.log('  Display:', styles.display);
                console.log('  Padding:', styles.padding);
                console.log('  Border radius:', styles.borderRadius);
            }

            if (button) {
                const styles = window.getComputedStyle(button);
                console.log('Button styles:');
                console.log('  Display:', styles.display);
                console.log('  Padding:', styles.padding);
                console.log('  Background:', styles.backgroundColor);
            }

            // Check if CSS file loaded
            fetch('/slds/styles/salesforce-lightning-design-system.min.css')
                .then(response => {
                    console.log('SLDS CSS Load Status:', response.status);
                    console.log('SLDS CSS Loaded:', response.ok);
                })
                .catch(err => console.error('Failed to load SLDS CSS:', err));
        });
    </script>
</body>
</html>
