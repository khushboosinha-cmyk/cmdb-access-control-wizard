<template>
    <div class="slds-container_x-large slds-container_center slds-m-top_large">
        <!-- Header -->
        <div class="slds-text-heading_large slds-text-align_center slds-m-bottom_large">
            LWC + Vite + Lightning Base Components Demo
        </div>

        <!-- Nav -->
        <div class="slds-m-bottom_large slds-text-align_center">
            <lightning-button

                onclick={handleNavigateHome}>

                icon-name="utility:image"
                onclick={handleNavigateIcons}>
            </lightning-button>
            <lightning-button
                class="slds-m-left_small"
                label="Settings"
                icon-name="utility:settings"
                onclick={handleNavigateSettings}>
            </lightning-button>
            <lightning-button
                class="slds-m-left_small"
                label="User 42"
                icon-name="utility:user"

                class="slds-m-left_small"

                icon-name="utility:palette"
                onclick={handleToggleSLDS}>
            </lightning-button>

                    label={darkModeLabel}

                    onclick={handleToggleDarkMode}>
