<template>
    <!-- Global shell: top, edge to edge, height by content -->
    <main-global-shell current-page={currentNavPage} onnavigate={handleNavNavigate} onpanelselect={handlePanelSelect}>
    </main-global-shell>

    <!-- Main content: fills available height, contents scroll -->
    <div class="app-main">
        <div class="app-main__inner slds-container_x-large slds-container_center slds-p-around_medium">
            <!-- Router outlet -->
            <template lwc:if={componentCtor}>
                <lwc:component lwc:is={componentCtor} onnavigateback={handleNavigateBack}></lwc:component>
            </template>
        </div>
        <main-theme-switcher
            slds-version={_sldsVersion}
            dark-mode={_darkMode}
            ontoggleslds={handleToggleSLDS}
            ontoggledarkmode={handleToggleDarkMode}>
        </main-theme-switcher>
    </div>
</template>
